openapi: 3.1.0
paths:
  /health:
    get:
      operationId: checkHealth
      tags: [Core]
      summary: Healthcheck del sistema
      description: |
        Verifica la salud operativa del wrapper y sus dependencias externas. 
        
        Este endpoint realiza un "ping" a los servicios upstream:
        - **Open Data Santander**: Verifica si el catálogo está accesible.
        - **Legacy API**: Comprueba si el motor de tiempo real responde.
        - **Memoria/Cache**: Estado de los índices locales.
      responses:
        200:
          description: El sistema está totalmente operativo.
          content:
            application/json:
              example:
                status: "ok"
                version: "3.0.0"
                uptime: "2d 4h 12m"
                services:
                  open_data: "up"
                  legacy_api: "up"
                  cache: "healthy"
              schema:
                type: object
                properties:
                  status: { type: string }
                  version: { type: string }
                  uptime: { type: string }
                  services:
                    type: object
                    properties:
                      open_data: { type: string }
                      legacy_api: { type: string }
                      cache: { type: string }
