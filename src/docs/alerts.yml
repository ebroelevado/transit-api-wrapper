openapi: 3.1.0
paths:
  /api/v1/alerts:
    get:
      operationId: getAlerts
      tags: [Alerts]
      summary: Estado del servicio e incidencias
      description: |
        Obtiene el listado de alertas oficiales emitidas por el TUS Santander. 
        
        Incluye información sobre:
        - **Cortes de calle**: Manifestaciones, eventos deportivos o procesiones.
        - **Obras**: Cambios temporales en la ubicación de paradas.
        - **Avisos Generales**: Cambios de horario por festivos o servicios especiales.
        
        Cada alerta tiene un nivel de severidad y un periodo de validez.
      responses:
        200:
          description: Listado de alertas activas.
          content:
            application/json:
              example:
                alerts:
                  - id: "2026-A1"
                    title: "Desvío por Maratón de Santander"
                    content: "Debido al maratón, las líneas LC, 1 y 2 se desviarán por el túnel de Tetuán."
                    severity: "high"
                    type: "service_change"
                    starts_at: "2026-05-10T08:00:00Z"
                    ends_at: "2026-05-10T14:00:00Z"
                total: 1
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        content: { type: string }
                        severity: { type: string, enum: [low, medium, high] }
                        type: { type: string }
                        starts_at: { type: string, format: date-time }
                        ends_at: { type: string, format: date-time, nullable: true }
                  total: { type: integer }
