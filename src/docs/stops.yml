openapi: 3.1.0
paths:
  /api/v1/stops:
    get:
      operationId: searchStops
      tags: [Stops]
      summary: Búsqueda avanzada de paradas
      description: |
        Accede al índice maestro de paradas del TUS. 
        
        ### Algoritmo Fuzzy Search
        Este endpoint utiliza un algoritmo de **búsqueda difusa** (Fuse.js) que permite encontrar resultados incluso con errores tipográficos, falta de acentos o variaciones en el orden de las palabras (ej. "ayuntamiento pza" vs "Plaza Ayuntamiento").
        
        Si se omite el parámetro `q`, el sistema devuelve un volcado completo de todas las paradas activas, ideal para inicializar caches locales en aplicaciones móviles.
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
          example: "ayuntamiento"
          description: "Término de búsqueda. Se ignoran mayúsculas y acentos."
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
          example: 10
          description: Control de paginación (Cantidad de items).
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
          example: 0
          description: Control de paginación (Desplazamiento).
      responses:
        200:
          description: Listado de paradas encontradas.
          content:
            application/json:
              example:
                results:
                  - stopId: 41
                    name: "Plaza Ayuntamiento"
                    lat: 43.4616
                    lng: -3.8055
                    address: "Ayuntamiento de Santander"
                    sentido: "Sardinero"
                    lines: ["1", "2", "LC"]
                    source: "open_data"
                total: 1
                query: "ayuntamiento"
                source: "open_data"
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Stop'
                  total:
                    type: integer
                  query:
                    type: string
                  source:
                    type: string

  /api/v1/stops/nearby:
    get:
      operationId: getNearbyStops
      tags: [Stops]
      summary: Geolocalización de paradas cercanas
      description: |
        Encuentra paradas de autobús en las proximidades de una ubicación GPS específica. 
        
        Calcula la distancia real en metros utilizando la **fórmula de Haversine** (distancia de gran círculo). Es el endpoint ideal para la función "Paradas cerca de mí" en aplicaciones de usuario final.
        
        Los resultados se devuelven ordenados de **menor a mayor distancia**.
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
            format: float
          example: 43.4616
          description: "Latitud WGS84 del punto de referencia."
        - in: query
          name: lng
          required: true
          schema:
            type: number
            format: float
          example: -3.8055
          description: "Longitud WGS84 del punto de referencia."
        - in: query
          name: radius
          required: false
          schema:
            type: integer
            default: 500
          example: 300
          description: "Radio máximo de búsqueda en metros. El sistema capa este valor a un máximo de 2000m por rendimiento."
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 10
          example: 5
          description: "Cantidad máxima de paradas a devolver."
      responses:
        200:
          description: Paradas cercanas ordenadas por distancia.
          content:
            application/json:
              example:
                center:
                  lat: 43.4616
                  lng: -3.8055
                radius_m: 500
                total: 1
                results:
                  - stopId: 41
                    name: "Plaza Ayuntamiento"
                    lat: 43.4616
                    lng: -3.8055
                    lines: ["1", "2", "LC"]
                    distance_m: 12.5
              schema:
                type: object
                properties:
                  center:
                    $ref: '#/components/schemas/Coordinate'
                  radius_m:
                    type: integer
                  total:
                    type: integer
                  results:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Stop'
                        - type: object
                          properties:
                            distance_m:
                              type: number

  /api/v1/stops/{stop}:
    get:
      operationId: getStopDetail
      tags: [Stops]
      summary: Ficha detallada de parada
      description: |
        Obtiene toda la información estática disponible sobre una parada específica.
        
        Este endpoint enriquece los datos base con:
        - **Información de Líneas**: Incluye el color corporativo de cada línea que pasa por la parada, facilitando la renderización de chips o badges en la UI.
        - **Contexto Geoespacial**: Lista de paradas adyacentes físicamente cercanas.
      parameters:
        - in: path
          name: stop
          required: true
          schema:
            type: integer
          example: 41
          description: ID numérico de la parada.
      responses:
        200:
          description: Datos detallados de la parada.
          content:
            application/json:
              example:
                stopId: 41
                name: "Plaza Ayuntamiento"
                lat: 43.4616
                lng: -3.8055
                address: "Ayuntamiento"
                sentido: "Sardinero"
                source: "open_data"
                lines:
                  - id: "LC"
                    color: "#00A650"
                    destinations: ["Estaciones"]
                nearby:
                  - stopId: 42
                    name: "Correos"
                    meters: 150
              schema:
                $ref: '#/components/schemas/Stop'
        404:
          description: La parada solicitada no existe.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'
