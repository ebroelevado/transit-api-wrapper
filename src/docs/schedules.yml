openapi: 3.0.0
paths:
  /api/v1/lines/{line}/schedules:
    get:
      tags: [Schedules]
      summary: Horarios programados de una línea
      parameters:
        - in: path
          name: line
          required: true
          schema:
            type: string
        - in: query
          name: day
          schema:
            type: string
            enum: [weekday, saturday, holiday]
            default: weekday
          description: "Día de la semana (weekday, saturday, holiday)"
        - in: query
          name: direction
          schema:
            type: string
            enum: [forward, backward]
            default: forward
          description: "Dirección de la línea (forward, backward)"
        - in: query
          name: limit
          schema:
            type: integer
          description: "Límite de resultados a mostrar"
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  line:
                    type: string
                  direction:
                    type: string
                  day:
                    type: string
                  day_name:
                    type: string
                  times:
                    type: array
                    items:
                      type: string
                  total:
                    type: integer
                  first:
                    type: string
                  last:
                    type: string
                  frequency_min:
                    type: integer
                    nullable: true
                  source:
                    type: string

  /api/v1/stops/{stop}/schedules:
    get:
      tags: [Schedules]
      summary: Horarios de todas las líneas en esta parada
      parameters:
        - in: path
          name: stop
          required: true
          schema:
            type: integer
        - in: query
          name: day
          schema:
            type: string
            enum: [weekday, saturday, holiday]
            default: weekday
          description: "Día de la semana (weekday, saturday, holiday)"
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
