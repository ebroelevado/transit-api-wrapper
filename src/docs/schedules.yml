openapi: 3.1.0
paths:
  /api/v1/schedules/{line}:
    get:
      operationId: getLineSchedule
      tags: [Schedules]
      summary: Horarios programados (Teóricos)
      description: |
        Accede a la rejilla de horarios teórica de una línea. 
        
        A diferencia de las "llegadas en tiempo real", este endpoint devuelve la **planificación estática** (frecuencias y horas de paso programadas) que no tiene en cuenta retrasos por tráfico.
        
        Es útil para consultas a futuro (ej. "¿A qué hora pasa el último bus de la noche?").
      parameters:
        - in: path
          name: line
          required: true
          schema: { type: string }
          example: "LC"
          description: ID de la línea.
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [workday, saturday, sunday]
            default: workday
          description: Tipo de día para filtrar los horarios.
      responses:
        200:
          description: Horarios recuperados.
          content:
            application/json:
              example:
                line: "LC"
                day_type: "workday"
                schedule:
                  - time: "07:30"
                    frequency_min: 10
                  - time: "07:40"
                    frequency_min: 10
              schema:
                type: object
                properties:
                  line: { type: string }
                  day_type: { type: string }
                  schedule:
                    type: array
                    items:
                      type: object
                      properties:
                        time: { type: string }
                        frequency_min: { type: integer }
        404:
          description: Línea no encontrada o sin horarios registrados.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'
