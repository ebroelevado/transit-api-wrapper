openapi: 3.1.0
paths:
  /api/v1/trip/plan:
    get:
      operationId: planTrip
      tags: [Trip]
      summary: Planificador de viajes (Cómo ir)
      description: |
        Calcula las mejores opciones de transporte entre dos puntos geográficos (Origen y Destino).
        
        ### Algoritmo de Enrutamiento
        El motor de búsqueda evalúa:
        1. **Distancia a pie** hasta la parada inicial.
        2. **Tiempo de viaje** en bus basado en promedios históricos.
        3. **Transbordos** necesarios (intentando minimizarlos).
        4. **Caminata final** hasta el destino.
        
        Devuelve un array de itinerarios sugeridos ordenados por tiempo total de trayecto.
      parameters:
        - in: query
          name: from_lat
          required: true
          schema: { type: number, format: float }
          example: 43.4616
          description: Latitud de origen.
        - in: query
          name: from_lng
          required: true
          schema: { type: number, format: float }
          example: -3.8055
          description: Longitud de origen.
        - in: query
          name: to_lat
          required: true
          schema: { type: number, format: float }
          example: 43.4721
          description: Latitud de destino.
        - in: query
          name: to_lng
          required: true
          schema: { type: number, format: float }
          example: -3.7915
          description: Longitud de destino.
      responses:
        200:
          description: Itinerarios sugeridos.
          content:
            application/json:
              example:
                itineraries:
                  - duration_min: 12
                    walk_m: 200
                    legs:
                      - type: "bus"
                        line: "LC"
                        from: "Ayuntamiento"
                        to: "Valdecilla"
                total: 1
              schema:
                type: object
                properties:
                  itineraries:
                    type: array
                    items:
                      type: object
                      properties:
                        duration_min: { type: integer }
                        walk_m: { type: integer }
                        legs: { type: array, items: { type: object } }
        400:
          description: Coordenadas inválidas.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'
