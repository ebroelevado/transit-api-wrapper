openapi: 3.1.0
paths:
  /api/v1/trip:
    get:
      operationId: planTrip
      tags: [Trip]
      summary: Planificador de viajes (Cómo ir)
      description: |
        Calcula las mejores opciones de transporte entre dos paradas de la red de transporte utilizando un algoritmo de grafos interno (Dijkstra ponderado).
        
        ### Algoritmo de Enrutamiento
        El motor de búsqueda utiliza un algoritmo **Dijkstra de alto rendimiento** optimizado con **MinHeap (Priority Queue)** para garantizar tiempos de respuesta mínimos.
        
        Evaluación dinámica:
        1. **Time-Dependent Routing**: El cálculo de transbordos no es estático; se consultan los **horarios reales (schedules)** para determinar el tiempo de espera exacto según la próxima salida programada.
        2. **Walking Connections**: El sistema descubre automáticamente enlaces a pie entre paradas cercanas (<300m) para optimizar transbordos complejos.
        3. **Penalizaciones Realistas**: Se incluyen tiempos de transferencia física y penalizaciones por cambio de línea para priorizar rutas cómodas.
        
        Devuelve itinerarios detallados con geometrías GeoJSON listas para ser representadas en mapas.
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: integer }
          example: 1
          description: ID de la parada de origen (ej. 1 para PCTCAN).
        - in: query
          name: to
          required: true
          schema: { type: integer }
          example: 10
          description: ID de la parada de destino (ej. 10 para Ayuntamiento).
      responses:
        200:
          description: Itinerarios sugeridos y resumen de la búsqueda.
          content:
            application/json:
              example:
                from:
                  stopId: 1
                  name: "PCTCAN"
                to:
                  stopId: 10
                  name: "Ayuntamiento"
                options:
                  - type: "direct"
                    duration_min: 15
                    legs:
                      - type: "bus"
                        line: "1"
                        from: "PCTCAN"
                        to: "Ayuntamiento"
                summary:
                  total_options: 1
                  direct_count: 1
                  transfer_count: 0
                  best_duration_min: 15
                  message: "1 route(s) found"
              schema:
                type: object
                properties:
                  from:
                    type: object
                    properties:
                      stopId: { type: integer }
                      name: { type: string }
                  to:
                    type: object
                    properties:
                      stopId: { type: integer }
                      name: { type: string }
                  options:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { type: string, enum: ["direct", "transfer"] }
                        duration_min: { type: integer }
                        legs: { type: array, items: { type: object } }
                  summary:
                    type: object
                    properties:
                      total_options: { type: integer }
                      direct_count: { type: integer }
                      transfer_count: { type: integer }
                      best_duration_min: { type: integer, nullable: true }
                      message: { type: string }
        400:
          description: Parámetros requeridos no proporcionados o inválidos.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Una o ambas paradas no existen en el sistema.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'

  /api/v1/stops/{stop}/connections:
    get:
      operationId: getConnections
      tags: [Trip]
      summary: Paradas alcanzables de forma directa
      description: |
        Devuelve todas las paradas que pueden ser alcanzadas sin transbordos desde una parada específica, y a través de qué líneas. Útil para construir mapas de alcance o sugerir destinos rápidos.
      parameters:
        - in: path
          name: stop
          required: true
          schema: { type: integer }
          example: 1
          description: ID de la parada de origen.
      responses:
        200:
          description: Lista de paradas alcanzables.
          content:
            application/json:
              example:
                stop:
                  stopId: 1
                  name: "PCTCAN"
                reachable_stops:
                  - stopId: 10
                    name: "Ayuntamiento"
                    via_lines: ["1", "2"]
              schema:
                type: object
                properties:
                  stop:
                    type: object
                    properties:
                      stopId: { type: integer }
                      name: { type: string }
                  reachable_stops:
                    type: array
                    items:
                      type: object
                      properties:
                        stopId: { type: integer }
                        name: { type: string }
                        via_lines:
                          type: array
                          items: { type: string }
        404:
          description: La parada no existe.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'
