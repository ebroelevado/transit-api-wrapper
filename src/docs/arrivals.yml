openapi: 3.1.0
paths:
  /api/v1/stops/{stop}/arrivals:
    get:
      operationId: getStopArrivals
      tags: [Arrivals]
      summary: Estimaciones de llegada en tiempo real
      description: |
        Consulta los tiempos de espera para los próximos autobuses que llegarán a una parada. 
        
        ### Origen de los datos
        Este endpoint es un proxy hacia la **Legacy API del TUS**, que procesa la telemetría GPS de la flota en tiempo real. 
        
        - **Estimación 1 y 2**: Representan los minutos restantes para el primer y segundo bus de cada línea.
        - **Valores Nulos**: Si un bus no tiene el GPS activo o está fuera de servicio, los valores de estimación pueden ser `null`.
        - **Cache**: Las respuestas se cachean por 15 segundos para optimizar el tráfico hacia el servidor legacy sin comprometer la precisión.
      parameters:
        - in: path
          name: stop
          required: true
          schema:
            type: integer
          example: 41
          description: ID de la parada.
        - in: query
          name: line
          required: false
          schema:
            type: string
          example: "LC"
          description: Opcional. Filtra los resultados para mostrar solo una línea específica.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
          example: 1
          description: Opcional. Limita el número de estimaciones por línea (ej. `limit=1` para ver solo el bus más inminente).
      responses:
        200:
          description: Predicciones de llegada obtenidas con éxito.
          content:
            application/json:
              example:
                stop:
                  stopId: 41
                  name: "Plaza Ayuntamiento"
                arrivals:
                  - line: "LC"
                    destination: "Intercambiador Sardinero"
                    estimate1: 2
                    estimate2: 15
                    is_legacy: true
                summary:
                  total: 1
                  source: "legacy_api"
                  cached: false
                  timestamp: "2026-05-03T20:30:00.000Z"
              schema:
                type: object
                properties:
                  stop:
                    type: object
                    properties:
                      stopId:
                        type: integer
                      name:
                        type: string
                  arrivals:
                    type: array
                    items:
                      $ref: '#/components/schemas/Arrival'
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      source:
                        type: string
                      cached:
                        type: boolean
                      timestamp:
                        type: string
                        format: date-time
        400:
          description: Parámetros de consulta inválidos.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'
        404:
          description: La parada no existe en el índice maestro.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'
