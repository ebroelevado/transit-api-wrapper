openapi: 3.1.0
paths:
  /api/v1/lines:
    get:
      operationId: getLines
      tags: [Core]
      summary: Catálogo completo de líneas de autobús
      description: |
        Obtiene un listado exhaustivo de todas las líneas que operan actualmente en la red del TUS Santander.
        
        Cada objeto de línea incluye metadatos visuales cruciales para el desarrollo de interfaces:
        - **Branding**: Colores oficiales en formato HEX (`color` y `text_color`).
        - **Disponibilidad**: Indicadores de si la línea tiene horarios programados (`has_schedule`) o está activa en tiempo real.
        - **Alcance**: Conteo total de paradas únicas.
      responses:
        200:
          description: Listado de líneas recuperado con éxito.
          content:
            application/json:
              example:
                lines:
                  - id: "1"
                    name: "Pcta. Juan Carlos I - Adarzo"
                    color: "#E30613"
                    text_color: "#FFFFFF"
                    destinations: ["Adarzo", "Pcta. Juan Carlos I"]
                    stops: 38
                    has_schedule: true
                    active: true
                total: 1
                updated: "2025-01-01T00:00:00.000Z"
              schema:
                type: object
                properties:
                  lines:
                    type: array
                    items:
                      $ref: '#/components/schemas/Line'
                  total:
                    type: integer
                  updated:
                    type: string
                    format: date-time

  /api/v1/lines/{line}:
    get:
      operationId: getLineDetail
      tags: [Core]
      summary: Detalle profundo de una línea específica
      description: |
        Devuelve información detallada sobre una única línea, ideal para vistas de "Detalle de Línea".
        
        A diferencia del catálogo general, este endpoint incluye:
        - **Estadísticas de Paradas**: Desglose exacto de cuántas paradas hay por sentido (Ida vs Vuelta).
        - **Mapping de Destinos**: Un objeto que mapea el ID del sentido con el nombre legible del destino final.
      parameters:
        - in: path
          name: line
          required: true
          schema:
            type: string
          example: "LC"
          description: "Identificador alfanumérico de la línea (ej: `LC` para Línea Centro, `1`, `N1` para nocturnas)."
      responses:
        200:
          description: Detalle de la línea recuperado.
          content:
            application/json:
              example:
                id: "LC"
                name: "Línea Centro"
                color: "#00A650"
                text_color: "#FFFFFF"
                schedule_id: "LC"
                destinations:
                  "1": "Estaciones"
                  "2": "Estaciones"
                stats:
                  stops_total: 12
                  stops_direction_1: 6
                  stops_direction_2: 6
                has_schedule: true
                active: true
              schema:
                $ref: '#/components/schemas/Line'
        404:
          description: La línea especificada no existe en la base de datos.
          content:
            application/json:
              $ref: '#/components/schemas/ErrorResponse'

  /api/v1/lines/{line}/route:
    get:
      operationId: getLineRoute
      tags: [Core]
      summary: Trazado de ruta y coordenadas GPS
      description: |
        Obtiene la secuencia ordenada de paradas que componen el trayecto de una línea. 
        
        Este endpoint es fundamental para **renderizar polilíneas en un mapa**. Devuelve las coordenadas `lat` y `lng` de cada parada en orden secuencial.
        
        > [!TIP]
        > Puedes filtrar por dirección para evitar que las líneas de ida y vuelta se solapen visualmente en tu implementación del mapa.
      parameters:
        - in: path
          name: line
          required: true
          schema:
            type: string
          example: "1"
          description: ID de la línea a consultar.
        - in: query
          name: direction
          required: false
          schema:
            type: string
            enum: [all, "1", "2"]
            default: all
          description: "Filtro de dirección: `1` (Ida), `2` (Vuelta), o `all` (Trayecto completo)."
      responses:
        200:
          description: Trazado de la ruta recuperado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  line:
                    type: string
                  color:
                    type: string
                  directions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: ID del sentido (1 o 2).
                        destination:
                          type: string
                          description: Destino de este sentido.
                        stops:
                          type: array
                          items:
                            $ref: '#/components/schemas/Stop'

  /api/v1/lines/{lineA}/intersect/{lineB}:
    get:
      operationId: getLineIntersection
      tags: [Compare]
      summary: Cálculo de transbordos (Intersección)
      description: |
        Calcula qué paradas físicas son compartidas por dos líneas distintas. 
        
        Esta es una utilidad potente para **motores de búsqueda de rutas manuales** o para sugerir al usuario dónde cambiar de línea para llegar a su destino.
        
        La respuesta devuelve una lista de `stopIds` donde ambas líneas coinciden.
      parameters:
        - in: path
          name: lineA
          required: true
          schema:
            type: string
          example: "LC"
          description: Primera línea para la intersección.
        - in: path
          name: lineB
          required: true
          schema:
            type: string
          example: "1"
          description: Segunda línea para la intersección.
      responses:
        200:
          description: Intersección calculada con éxito.
          content:
            application/json:
              example:
                line_a: "LC"
                line_b: "1"
                common_stops: [100, 101, 41]
                total: 3
              schema:
                type: object
                properties:
                  line_a:
                    type: string
                  line_b:
                    type: string
                  common_stops:
                    type: array
                    items:
                      type: integer
                  total:
                    type: integer
